name: E2E Tests

on:
  repository_dispatch:
    types: [app-deployed]
  schedule:
    - cron: '0 6 * * *'  # Nightly at 06:00 UTC (midnight CST)
  workflow_dispatch:
    inputs:
      project:
        description: 'Playwright project filter (leave empty to run all)'
        required: false
        default: ''
        type: string

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create E2E env file
        run: |
          cat > e2e/.env << 'ENVEOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          ENVEOF

      - name: Determine project filter
        id: filter
        run: |
          # workflow_dispatch input takes priority
          PROJECT="${{ github.event.inputs.project }}"
          # repository_dispatch can pass app name
          if [ -z "$PROJECT" ] && [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            PROJECT="${{ github.event.client_payload.app }}"
          fi
          if [ -n "$PROJECT" ]; then
            echo "args=--project=$PROJECT" >> "$GITHUB_OUTPUT"
            echo "Running tests for project: $PROJECT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "Running all tests"
          fi

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts ${{ steps.filter.outputs.args }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces-${{ github.run_id }}
          path: e2e/test-results/
          retention-days: 7
